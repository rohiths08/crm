services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - BATCH_SIZE=25
      - BATCH_CONCURRENCY=2
      - BATCH_MAX_RETRIES=1
      - GEMINI_TIMEOUT_MS=60000
      - MAX_FILE_SIZE_MB=10
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
